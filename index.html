<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible"
        content="ie=edge">
  <title>Kropp-Fitnes</title>
  <link rel="stylesheet"
        href="styles/styles.css">
  <script src="main.js"
          type="module"></script>
</head>
<body>
<header class="header"
        data-js-overlay>
  <div class="header__inner">
    <a class="header__logo logo"
       href="#">
      <img
        class="logo__image"
        src="./images/header-logo-kropp.svg"
        alt="Logo"
        width="136"
        height="25"
        loading="lazy"
      />
    </a>
    <dialog class="header__overlay-menu"
            data-js-overlay-menu>
      <nav class="header__menu">
        <ul class="header__menu-list">
          <li class="header__menu-item">
            <a class="header__menu-link is-current"
               href="#">Home
            </a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link"
               href="#">Pages
            </a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link"
               href="#">Portfolio
            </a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link"
               href="#">Blog
            </a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link"
               href="#">Shop
            </a>
          </li>
        </ul>
      </nav>
      <button class="header__book-button button button--white"
              type="button">Book now</button>
    </dialog>
    <button
      class="header__burger-button burger-button"
      type="button"
      aria-label="Open menu"
      title="Open menu"
      data-js-overlay-burger-button
    >
      <svg class="burger-button__svg"
           width="30"
           height="30"
           viewBox="0 0 100 100">
        <path class="burger-button__line burger-button__line--1"
              d="M 20,29.000046 H 80.000231 C 80.000231,29.000046 94.498839,28.817352 94.532987,66.711331 94.543142,77.980673 90.966081,81.670246 85.259173,81.668997 79.552261,81.667751 75.000211,74.999942 75.000211,74.999942 L 25.000021,25.000058" />
        <path class="burger-button__line burger-button__line--2"
              d="M 20,50 H 80" />
        <path class="burger-button__line burger-button__line--3"
              d="M 20,70.999954 H 80.000231 C 80.000231,70.999954 94.498839,71.182648 94.532987,33.288669 94.543142,22.019327 90.966081,18.329754 85.259173,18.331003 79.552261,18.332249 75.000211,25.000058 75.000211,25.000058 L 25.000021,74.999942" />
      </svg>
    </button>

  </div>
</header>
<main class="content">
  <h1 class="visually-hidden">Kropp Fitness Club</h1>
  <section class="banner">
    <div class="banner__inner">
      <h2 class="visually-hidden">Upcoming events</h2>
      <div class="banner__body">
        <div class="banner__info">
          <div class="banner__info-event">
            <span >New event</span>
            <span >coming up / <time datetime="06-07">june 7</time> - <time datetime="06-13">13</time>
        </span>
          </div>
        </div>
        <h3 class="banner__title">Crossfit</h3>
      </div>
      <div class="banner__pagination">
        <ul class="banner__pagination-list">
          <li class="banner__pagination-item">
            <button class="banner__pagination-button"
                    type="button"></button>
          </li>
          <li class="banner__pagination-item">
            <button class="banner__pagination-button"
                    type="button"></button>
          </li>
          <li class="banner__pagination-item">
            <button class="banner__pagination-button  is-current"
                    type="button"></button>
          </li>
        </ul>
      </div>
    </div>

  </section>
</main>
<footer class="footer">
  Footer
</footer>

</body>
</html>
